<svg viewBox="0 0 1150 820" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Inter, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#8a97a0"/>
    </marker>
    <marker id="arrowThick" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#546472"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a2733" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="userGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eaf7ff"/>
      <stop offset="100%" stop-color="#d5eefd"/>
    </linearGradient>
    <linearGradient id="frontendGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eefbf0"/>
      <stop offset="100%" stop-color="#dcf3e1"/>
    </linearGradient>
    <linearGradient id="backendGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8ef"/>
      <stop offset="100%" stop-color="#ffecd4"/>
    </linearGradient>
    <linearGradient id="externalGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9f0fc"/>
      <stop offset="100%" stop-color="#f0ddf7"/>
    </linearGradient>
  </defs>

  <style>
    .boundary { fill:#fbfbfc; stroke:#d8dce0; stroke-width:1.2; }
    .boundaryLabel { fill:#4a5560; font-size:14px; font-weight:700; letter-spacing:.2px; }
    .user { fill:url(#userGrad); stroke:#0288d1; stroke-width:1.5; }
    .frontend { fill:url(#frontendGrad); stroke:#379150; stroke-width:1.5; }
    .backend { fill:url(#backendGrad); stroke:#e08b1f; stroke-width:1.5; }
    .external { fill:url(#externalGrad); stroke:#8a34b3; stroke-width:1.5; }
    .title { font-size:13.5px; font-weight:700; }
    .sub { font-size:12px; opacity:.85; }
    .edgeLabel { fill:#3f4a54; font-size:11.5px; }
    .edge { stroke:#8a97a0; stroke-width:1.4; fill:none; marker-end:url(#arrow); }
    .edgeThick { stroke:#546472; stroke-width:2; fill:none; marker-end:url(#arrowThick); }
    .edgeDashed { stroke:#8a97a0; stroke-width:1.4; fill:none; stroke-dasharray:4,3; marker-end:url(#arrow); }
    .node { filter:url(#softShadow); }
  </style>

  <!-- ================= User ================= -->
  <rect x="70" y="20" width="230" height="72" rx="14" class="user node"/>
  <text x="185" y="50" text-anchor="middle" class="title" fill="#01579b">👤 User</text>
  <text x="185" y="70" text-anchor="middle" class="sub" fill="#01579b">Pastes event text</text>

  <line x1="185" y1="92" x2="185" y2="140" class="edge"/>
  <text x="200" y="120" class="edgeLabel">1. text + timezone</text>

  <!-- ================= Client Side Boundary ================= -->
  <rect x="30" y="140" width="320" height="420" rx="16" class="boundary"/>
  <text x="190" y="166" text-anchor="middle" class="boundaryLabel">CLIENT SIDE — BROWSER</text>

  <rect x="75" y="190" width="230" height="68" rx="10" class="frontend node"/>
  <text x="190" y="218" text-anchor="middle" class="title" fill="#1b5e20">💻 Browser UI</text>
  <text x="190" y="237" text-anchor="middle" class="sub" fill="#1b5e20">React / Next.js</text>

  <line x1="190" y1="258" x2="190" y2="316" class="edge"/>
  <text x="205" y="292" class="edgeLabel">4. View / Edit data</text>

  <rect x="75" y="316" width="230" height="68" rx="10" class="frontend node"/>
  <text x="190" y="344" text-anchor="middle" class="title" fill="#1b5e20">✏️ Event Editor</text>
  <text x="190" y="363" text-anchor="middle" class="sub" fill="#1b5e20">Component</text>

  <line x1="190" y1="384" x2="190" y2="442" class="edge"/>
  <text x="205" y="418" class="edgeLabel">5. Generate ics</text>

  <rect x="75" y="442" width="230" height="68" rx="10" class="frontend node"/>
  <text x="190" y="470" text-anchor="middle" class="title" fill="#1b5e20">⚙️ ICS Generator</text>
  <text x="190" y="489" text-anchor="middle" class="sub" fill="#1b5e20">Utility</text>

  <!-- ================= Server Side Boundary ================= -->
  <rect x="410" y="140" width="320" height="420" rx="16" class="boundary"/>
  <text x="570" y="166" text-anchor="middle" class="boundaryLabel">SERVER SIDE — NEXT.JS / NODE</text>

  <rect x="455" y="190" width="230" height="68" rx="10" class="backend node"/>
  <text x="570" y="218" text-anchor="middle" class="title" fill="#c0620b">🧠 API Route</text>
  <text x="570" y="237" text-anchor="middle" class="sub" fill="#c0620b">ai-parser.ts</text>

  <line x1="570" y1="258" x2="570" y2="425" class="edgeDashed"/>
  <text x="585" y="348" class="edgeLabel">GET/PUT /api/settings/ai</text>

  <!-- SQLite cylinder -->
  <g class="node">
    <path d="M455,440 a115,15 0 1,0 230,0 a115,15 0 1,0 -230,0 M455,440 L455,505 a115,15 0 0,0 230,0 L685,440"
          fill="url(#backendGrad)" stroke="#e08b1f" stroke-width="1.5"/>
  </g>
  <text x="570" y="470" text-anchor="middle" class="title" fill="#c0620b">💾 SQLite Database</text>
  <text x="570" y="489" text-anchor="middle" class="sub" fill="#c0620b">Stores API key &amp; model</text>

  <!-- ================= Groq API ================= -->
  <rect x="800" y="188" width="230" height="72" rx="14" class="external node"/>
  <text x="915" y="218" text-anchor="middle" class="title" fill="#4a148c">🤖 Groq API</text>
  <text x="915" y="238" text-anchor="middle" class="sub" fill="#4a148c">Llama 3.3 70B</text>

  <!-- Browser UI <-> API Route (parallel, offset, non-overlapping) -->
  <path d="M305,212 L455,212" class="edgeThick"/>
  <text x="318" y="205" class="edgeLabel">2. POST /api/ai/parse</text>

  <path d="M455,238 L305,238" class="edgeThick"/>
  <text x="318" y="255" class="edgeLabel">3. returns parsed event</text>

  <!-- API Route <-> Groq API (curved, cleanly separated) -->
  <path d="M685,204 C 745,190 745,190 800,204" class="edge"/>
  <text x="705" y="185" class="edgeLabel">System + User messages</text>

  <path d="M800,244 C 745,258 745,258 685,244" class="edge"/>
  <text x="715" y="269" class="edgeLabel">JSON event data</text>

  <!-- ================= Calendar App ================= -->
  <line x1="190" y1="510" x2="190" y2="610" class="edge"/>
  <text x="205" y="565" class="edgeLabel">6. .ics download</text>

  <rect x="55" y="610" width="270" height="72" rx="14" class="external node"/>
  <text x="190" y="640" text-anchor="middle" class="title" fill="#4a148c">📅 Calendar App</text>
  <text x="190" y="660" text-anchor="middle" class="sub" fill="#4a148c">Google / Outlook / Apple</text>

</svg>
